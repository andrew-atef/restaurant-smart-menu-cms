name: OCI ARM Sniper

on:
  schedule:
    - cron: '0 * * * *' # يعمل تلقائياً كل ساعة
  workflow_dispatch: # يتيح لك تشغيله يدوياً بضغطة زر في أي وقت

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install oci requests

      - name: Setup OCI Credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG_CONTENT }}" > ~/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_private_key.pem
          # تعديل مسار المفتاح داخل ملف الإعدادات ليكون صحيحاً
          sed -i 's|key_file=.*|key_file=/home/runner/.oci/oci_api_private_key.pem|' ~/.oci/config

      - name: Run ARM Sniper
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          python sniper.py
